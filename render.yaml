services:
  - type: web
    name: cross-mule-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
    healthCheckPath: /health
