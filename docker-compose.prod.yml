version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cross-mule-detection:latest
    container_name: mule_detection_backend
    restart: always
    ports:
      - "8000:8080"
    environment:
      - APP_ENV=production
      - AUTH_REQUIRED=true
      - API_KEY=${API_KEY:-secure-production-api-key}
      - RATE_LIMIT_WINDOW_SECONDS=60
      - RATE_LIMIT_PER_WINDOW=300
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:5173}
      - SQLITE_PERSISTENCE_ENABLED=false
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/mule_db
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-secretpassword}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  stream_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cross-mule-detection:latest
    container_name: mule_detection_stream_worker
    restart: always
    command: ["sh", "-c", "python -m src.real_time_engine.kafka_consumer"]
    environment:
      - APP_ENV=production
      - SQLITE_PERSISTENCE_ENABLED=false
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/mule_db
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-secretpassword}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=live-transactions
      - KAFKA_GROUP_ID=mule_detector_group
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: mule_detection_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mule_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mule_detection_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: mule_detection_neo4j
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-secretpassword}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: mule_detection_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: mule_detection_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  neo4jdata:
