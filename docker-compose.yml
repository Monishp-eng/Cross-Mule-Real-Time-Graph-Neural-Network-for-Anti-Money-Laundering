version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: cross-mule-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cross-mule-backend
    restart: unless-stopped
    environment:
      PORT: 8000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/cross_mule_detection
      JWT_SECRET: change_me_for_production
      JWT_REFRESH_SECRET: change_me_refresh_for_production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - mongo

volumes:
  mongo_data:
